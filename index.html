function hasHero(selected, id){

function avgVal(selected, key){
return selected.reduce((a,h)=>a+(h.stats[key]||0),0) / selected.length;
}
function sumThreat(selected, skill){
return selected.reduce((a,h)=>a+(h.skill_threat?.Soldier76?.[skill]||0),0);
}
function topBy(selected, key, count=3){
return [...selected].sort((a,b)=>(b.stats[key]||0)-(a.stats[key]||0)).slice(0,count);

function getUltDenialAbilities(selected){
const abilities = [];
selected.forEach(h=>{
const list = h.ult_denial_priority?.Soldier76 || [];
list.forEach(a=>{
abilities.push({

ability: a.ability,
priority: a.priority || 0,
type: a.type || 'unknown'

}
function formatAbilityList(list){

function priorityTargetsAdvanced(selected){

const highground = avgVal(selected,'threat_highground') >= 6.5;
let sorted;
if(healHigh){
sorted = [...selected].sort((a,b)=>{
const av=(a.role==='サポート'?10:0)+(a.stats.healing_output||0)+(a.stats.utility||0);
const bv=(b.role==='サポート'?10:0)+(b.stats.healing_output||0)+(b.stats.utility||0);
return bv-av;
});
} else if(supportThreat){
sorted = [...selected].sort((a,b)=>(b.stats.threat_support||0)-(a.stats.threat_support||0));
} else if(highground){
sorted = [...selected].sort((a,b)=>(b.stats.threat_highground||0)-(a.stats.threat_highground||0));
} else {
sorted = [...selected].sort((a,b)=>(b.stats.pick_potential||0)+(b.stats.utility||0)-((a.stats.pick_potential||0)+(a.stats.utility||0)));
}
return sorted.slice(0,3);
}

function rankedUnique(lines, max=5){
const seen=new Set();
const out=[];
for(const line of lines){
const key = line.replace(/[。、\s]/g,'').slice(0,38);
if(!seen.has(key)){
seen.add(key);
out.push(line);
}
if(out.length>=max) break;
}
return out;
}

if(avg(selected,'healing_required')>=6.8 && avg(selected,'health_pack_access')<6.5) lines.push('敵前衛を撃ち続けるだけで終わらず、回復しているサポートへ別射線を作る。');
if(avg(selected,'health_pack_access')>=7) lines.push('削った敵を深追いしすぎず、ヘルスパック側へ逃げた後の再接近を警戒する。');
return lines;
}
function priorityTargets(selected){
return [...selected].sort((a,b)=>{
const av=(a.stats.utility+a.stats.survivability+a.stats.ult_denial);
const bv=(b.stats.utility+b.stats.survivability+b.stats.ult_denial);
return bv-av;
}).slice(0,3);
}
function diagnose(){
const ids=['tank','dps1','dps2','sup1','sup2'].map(id=>document.getElementById(id).value);
const selected=ids.map(id=>byId[id]);
const map=getMapProfile();
const allies=getAllyHeroes();
const type=compType(selected);
const plan=chooseMainPlan(selected);
let opening=[...heroSpecificLines(selected,'opening'), ...openingActions(selected)];
opening=applyMapAdvice(opening,map,selected);
opening=applyAllyAdvice(opening,allies,selected);
opening=rankedUnique(opening,6);
let order=[...shootingOrder(selected), ...heroSpecificLines(selected,'fight')];
order=applyAllyAdvice(order,allies,selected);
order=rankedUnique(order,7);
let peak=peakTiming(selected);
peak=applyMapAdvice(peak,map,selected);
peak=rankedUnique(peak,5);
let visor=rankedUnique(visorPlan(selected),6);
let forbidden=[...heroSpecificLines(selected,'forbidden'), ...forbiddenActions(selected)];
forbidden=rankedUnique(forbidden,7);
const targets=priorityTargetsAdvanced(selected);
document.getElementById('result').innerHTML = `
<div class="card"><h2>構成評価</h2><div class="grid"><div class="kpi"><div class="name">構成タイプ</div><div class="value">${type}</div></div><div class="kpi"><div class="name">ソルジャーの戦い方</div><div class="value">${plan}</div></div><div class="kpi"><div class="name">マップ補正</div><div class="value">${map?.name || '未選択'}</div></div><div class="kpi"><div class="name">味方構成補正</div><div class="value">${allies.length ? allies.map(h=>h.hero_ja).join(' / ') : '未選択'}</div></div></div><h3>① 開幕行動</h3><ul>${opening.map(x=>`<li>${x}</li>`).join('')}</ul><h3>② 撃つ順番</h3><ul>${order.map(x=>`<li>${x}</li>`).join('')}</ul><h3>③ ピークするタイミング</h3><ul>${peak.map(x=>`<li>${x}</li>`).join('')}</ul><h3>④ タクティカル・バイザー使用条件</h3><ul>${visor.map(x=>`<li>${x}</li>`).join('')}</ul><h3>⑤ 絶対にやってはいけないこと</h3><ul>${forbidden.map(x=>`<li>${x}</li>`).join('')}</ul><h3>優先して意識する敵</h3>
${targets.map((h,i)=>`<span class="pill">${i+1}. ${h.hero_ja}</span>`).join('')}
<p class="small">※内部のタグ数値とスキル脅威度は非表示です。</p></div>`;
}
function buildHeroGrid(){
const wrap=document.getElementById('heroGrid');
const roleOrder=['タンク','ダメージ','サポート'];
wrap.innerHTML=roleOrder.map(role=>{
const list=heroes.filter(h=>h.role===role);
const groups=[...new Set(list.map(h=>h.sub_role))];
return `<div class="roleTitle">${role}</div>`+groups.map(g=>{
const members=list.filter(h=>h.sub_role===g);
return `<h3>${g}</h3><div class="heroGrid">${members.map(h=>`<button class="heroBtn" onclick="showHero('${h.hero_id}', this)"><div class="pixel">${h.hero_ja[0]}</div><div class="heroName">${h.hero_ja}</div></button>`).join('')}</div>`;
}).join('');
}).join('');
}
buildHeroGrid();
function showHero(id, btn){
document.querySelectorAll('.heroBtn').forEach(b=>b.classList.remove('active'));
if(btn) btn.classList.add('active');
const h=byId[id];
const fake=[h, byId['Soldier: 76']].filter(Boolean);
const skillEntries = Object.entries(h.skill_threat.Soldier76).sort((a,b)=>b[1]-a[1]);
const mainThreat = skillEntries[0][0];
const label = DATA.skills.find(s=>s.key===mainThreat)?.label_ja || mainThreat;
const caution = [];
if(h.stats.threat_highground>=7) caution.push('高台を取り返されやすい。最上段に居座らず、降り口のある位置から撃つ。');
if(h.stats.threat_soldier>=7) caution.push('ソルジャー本人へ接近されやすい。1対1を受けず、味方の射線へ下がる。');
if(h.stats.pick_potential>=7) caution.push('先に撃破される危険が高い。同じ角から3秒以上顔を出さない。');
if(h.stats.healing_output>=7) caution.push('回復力が高い。単独で倒し切らず、回復アビリティ使用後に再度撃つ。');
if(h.stats.health_pack_access>=8) caution.push('ヘルスパックで立て直されやすい。逃げた敵を追いすぎず、戻り道を撃つ。');
if(h.stats.ult_denial>=7) caution.push('タクティカル・バイザーを妨害されやすい。重要アビリティ使用後まで待つ。');
if(!caution.length) caution.push('遮蔽の近くで中距離から継続してダメージを与える。');
let useTiming = '';
if(mainThreat==='Helix Rocket') useTiming='ヘリックス・ロケットは先撃ちせず、相手の回避・防御アビリティを見てから使う。';
else if(mainThreat==='Tactical Visor') useTiming='タクティカル・バイザーは相手の防御アビリティ使用後、または対象が遮蔽から離れた瞬間に使う。';
else if(mainThreat==='Biotic Field') useTiming='バイオティック・フィールドは削られてからではなく、接近される直前に置く。';
else if(mainThreat==='Sprint') useTiming='スプリントで逃げるだけでは追いつかれやすい。遮蔽と味方射線へ逃げる。';
else useTiming='通常射撃で長く撃ち合わず、短いピークで体力差を作る。';
document.getElementById('detailResult').innerHTML=`
<div class="card"><h2>${h.hero_ja}</h2><div><span class="pill">${h.role}</span><span class="pill">${h.sub_role}</span></div><h3>ソルジャー視点の具体的な注意点</h3><ul>${caution.map(c=>`<li>${c}</li>`).join('')}</ul><h3>特に価値を下げられやすいアビリティ</h3><p class="note">${label}。${useTiming}</p><h3>撃ち方</h3><ul><li>最初は通常射撃で体力差を作る。</li><li>相手の移動・防御アビリティを見た後にヘリックス・ロケットを使う。</li><li>倒し切れない場合は深追いせず、次に顔を出す位置を撃つ。</li></ul></div>`;
}
diagnose();
</script></body></html>
