function showSection(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');}
function target(){return document.getElementById('targetHero').value;}
function cfg(){return TARGET_CONFIG[target()];}
function targetJa(){return cfg().ja;}
function syncTargetFromDetail(){document.getElementById('targetHero').value=document.getElementById('targetHeroDetail').value;updateTargetLabel();}
function updateTargetLabel(){document.getElementById('targetHeroDetail').value=target();document.getElementById('headline').textContent=`${targetJa()}視点で、敵構成から立ち回りを診断します。`;document.getElementById('result').innerHTML='';document.getElementById('detailResult').innerHTML='';}
function opt(role){return heroes.filter(h=>h.role===role).map(h=>`<option value="${h.hero_id}">${h.hero_ja}</option>`).join('');}
function initSelects(){document.getElementById('tank').innerHTML=opt('タンク');document.getElementById('dps1').innerHTML=opt('ダメージ');document.getElementById('dps2').innerHTML=opt('ダメージ');document.getElementById('sup1').innerHTML=opt('サポート');document.getElementById('sup2').innerHTML=opt('サポート');}
function selectedEnemy(){return ['tank','dps1','dps2','sup1','sup2'].map(id=>byId[document.getElementById(id).value]);}
function avg(list,key){return list.reduce((a,h)=>a+(h.stats?.[key]||0),0)/list.length;}
function sum(list,key){return list.reduce((a,h)=>a+(h.stats?.[key]||0),0);}
function topBy(list,key,n=3){return [...list].sort((a,b)=>(b.stats?.[key]||0)-(a.stats?.[key]||0)).slice(0,n);}
function unique(arr,n=6){return [...new Set(arr.filter(Boolean))].slice(0,n);}
function compType(sel){if(avg(sel,'mobility')>=7)return'高機動構成';if(avg(sel,'poke_strength')>=7||avg(sel,'poke')>=7)return'遠距離圧力構成';if(avg(sel,'brawl_strength')>=7||avg(sel,'rush')>=7)return'近距離圧力構成';if(avg(sel,'sustain')>=7)return'継戦構成';return'バランス構成';}
function sanitizeForTarget(text){let out=String(text||'');for(const term of cfg().forbiddenTerms){out=out.replaceAll(term, cfg().id==='Soldier76' ? '主要スキル' : '主要アビリティ');}return out;}

// Soldier76 engine: ソルジャー固有語だけを使用
const SoldierEngine = {
  val(h,key){return Number(h?.stats?.[key]||0);},
  names(list,fallback='敵'){const arr=(list||[]).filter(Boolean).map(h=>h.hero_ja);return arr.length?arr.join('、'):fallback;},
  skillPriority(h,fields=[]){const s=h?.stats||{};return (s.ult_denial||0)*2+(s.visor_denial||0)*1.6+(s.threat_soldier||0)*.45+(s.pick_potential||0)*.25+(s.utility||0)*.15;},
  prioritySkillList(list,fields=[]){return [...(list||[]).filter(Boolean)].sort((a,b)=>this.skillPriority(b,fields)-this.skillPriority(a,fields));},
  skillInfo(h){return (typeof SOJOURN_ENEMY_SKILLS!=='undefined' && SOJOURN_ENEMY_SKILLS[h?.hero_id]) || {};},
  skillItems(list,fields,max=6){
    const arr=[];
    for(const h of this.prioritySkillList(list,fields)){
      const info=this.skillInfo(h);
      for(const f of fields){for(const sk of (info[f]||[]))arr.push(`${h.hero_ja}の${sk}`);}
    }
    return unique(arr,max);
  },
  skillsText(list,fields,fallback='主要スキル',max=6){const arr=this.skillItems(list,fields,max);return arr.length?arr.join('、'):fallback;},

  lucioTempoNote(){return '';},
  compScore(sel){let raw=5-(avg(sel,'threat_soldier')-5)*.45-(avg(sel,'ult_denial')-5)*.25+(avg(sel,'health_pack_access')>=7?.3:0);if(raw>=5.7)return'やや有利';if(raw>=4.6)return'五分';if(raw>=3.5)return'やや不利';return'不利';},
  plan(sel){if(avg(sel,'threat_highground')>=7)return'高台を撃って降りる型';if(avg(sel,'ult_denial')>=7)return'タクティカル・バイザー管理型';if(avg(sel,'pick_potential')>=7)return'短時間ピーク型';return'中距離継続火力型';},
  diagnose(sel){

      ''
    ].filter(Boolean),6);

    }
  }
};

    const threat=topBy(sel,'threat_sojourn',3);
    const block=topBy(sel,'overclock_threat',4).filter(h=>this.val(h,'overclock_threat')>=7);
    const disrupt=topBy(sel,'disruptor_value',3);
    const scores={
      dive:dive.length*1.15 + avg(sel,'mobility')*.55 + avg(sel,'threat_sojourn')*.35,
      brawl:brawl.length*1.1 + avg(sel,'rush')*.55 + avg(sel,'sustain')*.25,
      poke:poke.length*1.05 + avg(sel,'poke')*.65 + snipers.length*.8,
      air:flyers.length*1.9 + avg(flyers,'mobility')*.25,
      save:save.length*1.2 + avg(sel,'healing_output')*.35 + avg(sel,'sustain')*.25
    };
    let style='balance';
    for(const k of Object.keys(scores)){if(scores[k]>scores[style]||style==='balance')style=k;}
    if(flyers.length>=2)style='air';
    if(dive.length>=3 && avg(sel,'threat_sojourn')>=6.5)style='dive';
    if(snipers.length>=2 && poke.length>=3)style='poke';
    const compLabel={
      dive:'高機動ダイブ対策型',
      brawl:'近距離ラッシュ分断型',
      poke:'遠距離射線管理型',
      air:'空中機動対策型',
      save:'高耐久・救助スキル崩し型',
      balance:'標準ピック判断型'
    }[style];
    return {tank,dps,supports,dive,brawl,poke,flyers,snipers,flankers,save,immobile,mobileSup,mitigation,farm,pick,threat,block,disrupt,style,compLabel,scores};
  },
  priorityTargets(sel,n=3){
    const imm=this.pools.immobileSupport, save=this.pools.save, mobile=this.pools.mobileSupport;
    return [...sel].sort((a,b)=>this.targetScore(b,imm,save,mobile)-this.targetScore(a,imm,save,mobile)).slice(0,n);
  },
  targetScore(h,imm,save,mobile){
    let s=this.val(h,'railgun_pick_risk')*1.45 + this.val(h,'railgun_farm')*.25 - this.val(h,'overclock_threat')*.18;
    if(h.role==='サポート')s+=2.2;
    if(h.role==='ダメージ')s+=1.1;
    if(imm.includes(h.hero_id))s+=1.4;
    if(save.includes(h.hero_id))s+=.8;
    if(mobile.includes(h.hero_id))s-=.5;
    if(this.pools.flyer.includes(h.hero_id))s-=.25;
    return s;
  },
  compScore(sel){
    const c=this.analyze(sel);
    let raw=5
      +(avg(sel,'railgun_farm')-5)*.35
      +(avg(sel,'railgun_pick_risk')-5)*.48
      +(avg(sel,'disruptor_value')-5)*.22
      -(avg(sel,'threat_sojourn')-5)*.52
      -(avg(sel,'overclock_threat')-5)*.34;
    if(c.style==='dive')raw-=.75;
    if(c.style==='poke' && c.snipers.length>=2)raw-=.55;
    if(c.style==='air' && c.flyers.length>=2)raw-=.35;
    if(c.style==='brawl' && c.disrupt.length>=2)raw+=.45;
    if(c.immobile.length>=1)raw+=.45;
    if(c.save.length>=2)raw-=.35;
    if(raw>=6.4)return'有利';
    if(raw>=5.3)return'やや有利';
    if(raw>=4.2)return'五分';
    if(raw>=3.1)return'やや不利';
    return'不利';
  },
  plan(sel){
    const c=this.analyze(sel);
    if(c.style==='dive')return'スライド温存・受け撃ち型';
    if(c.style==='brawl')return'ディスラプター分断・レール回転型';
    if(c.style==='poke')return'短時間ピーク・横射線ピック型';
    if(c.style==='air')return'高台維持・着地狩り型';
    if(c.style==='save')return'救助スキル確認・二段階ピック型';
    if(avg(sel,'railgun_farm')>=7.5)return'レールガン回転型';
    if(avg(sel,'overclock_threat')>=7)return'オーバークロック管理型';
    return'標準ピック型';
  },
  diagnose(sel){
    const c=this.analyze(sel);
    const firstFarm=c.farm[0], firstPick=c.pick[0], mainThreat=c.threat[0], tank=c.tank;
    const supportNames=this.names(c.supports,'サポート');
    const saveNames=this.names(c.save,'救助スキル持ち');
    const blockNames=this.names(c.block,'防御・無敵・回避スキル持ち');
    const saveSkillText=this.skillsText(c.save,['save','block'],'救助スキル',3);
    const blockSkillText=this.skillsText(c.block,['block','avoid','save'],'防御・無敵・回避スキル',3);
    const diveSkillText=this.skillsText(c.dive,['engage','avoid'],'接近スキル',3);
    const flankerSkillText=this.skillsText(c.flankers,['engage','avoid'],'接近・離脱スキル',3);
    const flyerSkillText=this.skillsText(c.flyers,['avoid','engage'],'飛行・移動スキル',3);
    const sniperSkillText=this.skillsText(c.snipers,['threat','engage'],'長射程スキル',3);
    const disruptNames=this.names(c.disrupt,'まとまりやすい敵');
    const factors=[];
    for(const note of this.sustainedTempoNotes(sel))factors.push(note);
    if(c.style==='dive'){
      factors.push(`${this.names(c.dive)}が入ってくる構成。勝敗条件は、${diveSkillText}を見てから受け、着地後の${mainThreat.hero_ja}へ通常射撃・レールガンを返すこと。`);
      factors.push(`パワー・スライドは攻撃用ではなく、${flankerSkillText || diveSkillText}を受けた後の退避用に残す。`);
    } else if(c.style==='brawl') {
      factors.push(`${this.names(c.brawl)}が固まって前進する構成。勝敗条件は、入口にディスラプター・ショットを置いて前衛と後衛を分けること。`);
      factors.push(`${firstFarm.hero_ja}でエネルギーを作り、${firstPick.hero_ja}へレールガンを切り替える。正面タンクだけを撃ち続けない。`);
    } else if(c.style==='poke') {
      factors.push(`${this.names(c.snipers.length?c.snipers:c.poke)}の長い射線が危険。${sniperSkillText}を置かれている角では見合わず、短いピークでレールガンだけ通すこと。`);
      factors.push(`${firstFarm.hero_ja}を撃ってエネルギーを作り、遮蔽から離れた${firstPick.hero_ja}へ即座に撃つ。`);
    } else if(c.style==='air') {
      factors.push(`${this.names(c.flyers)}が空中から射線をずらす構成。勝敗条件は、${flyerSkillText}中を追い回さず、着地・直線移動・支援中の硬直を撃つこと。`);
      factors.push(`地上の${firstFarm.hero_ja}でエネルギーを作り、空中組はレールガンを当てられる瞬間だけ狙う。`);
    } else if(c.style==='save') {
      factors.push(`${saveNames}が撃破をずらす構成。勝敗条件は、${saveSkillText}を使わせてから二発目のレールガンかオーバークロックを通すこと。`);
      factors.push(`${supportNames}を直接抜けない時は、ディスラプター・ショットで退路を塞いで${saveSkillText}を先に吐かせる。`);
    } else {
      factors.push(`エネルギー源は${this.names(c.farm)}。最初からサポートを狙いすぎず、撃てる相手でレールガンを準備する。`);
      factors.push(`撃破対象は${this.names(c.pick.slice(0,3))}。レールガンが溜まったらタンク撃ちからすぐ切り替える。`);
    }
    if(c.save.length)factors.push(`${saveSkillText}が残っている間は、レールガンを一発で終わらせず、次の射線を用意する。`);
    if(c.block.length)factors.push(`オーバークロック前に${blockSkillText}を確認する。残っている時は先に通常射撃とディスラプター・ショットで使わせる。`);
    const opening=[];
    opening.push(`開幕位置：${tank?tank.hero_ja:'敵タンク'}を撃てるが、${mainThreat.hero_ja}から一手で触られない高台か横射線を取る。`);
    if(sel.some(h=>h.hero_id==='Lúcio'))opening.push('ルシオ入りは、アンプ・イット・アップで敵が角を越える瞬間だけ、撃ち続けず一段下がって受ける。');
    if(c.style==='dive')opening.push(`最初の接敵では前に滑らない。${this.skillsText(c.dive.slice(0,2),['engage','avoid'],'接近スキル',3)}を見てから、味方側へパワー・スライドで逃げる。`);
    else if(c.style==='brawl')opening.push(`敵が曲がり角を越える直前にディスラプター・ショットを置き、${disruptNames}の前進を止める。`);
    else if(c.style==='poke')opening.push(`${this.names(c.snipers.length?c.snipers.slice(0,2):c.poke.slice(0,2))}の正面で長く見ない。1ピーク1射撃で遮蔽へ戻る。`);
    else if(c.style==='air')opening.push(`空中組を見上げ続けず、まず${firstFarm.hero_ja}からエネルギーを確保する。${flyerSkillText}の後の着地にレールガンを置く。`);
    else opening.push(`通常射撃で${firstFarm.hero_ja}を削り、60以上になったら${firstPick.hero_ja}へ狙いを変える。${this.firstSkillText(firstPick,['block','save','avoid','engage'],'主要スキル')}の使用直後が撃ち時。`);
    opening.push(`レールガンが60から100に入ったら、${firstPick.hero_ja}か${supportNames}が遮蔽から出る瞬間だけピークする。`);
    const order=[];
    order.push(`エネルギー源：${this.names(c.farm)}。ここでレールガンを準備する。`);
    order.push(`最初の撃破対象：${this.names(c.pick.slice(0,3))}。タンク撃ちのまま終わらせない。`);
    if(c.save.length)order.push(`救助確認：${saveSkillText}を使った後、同じ対象か逆側のサポートへレールガンを撃つ。`);
    else order.push(`追撃判断：レールガン後に倒し切れない時は、ディスラプター・ショットで退路を塞いで通常射撃を足す。`);
    if(c.style==='dive')order.push(`受けの順番：${diveSkillText}を見る、スライドで距離を作る、着地後の${mainThreat.hero_ja}へ撃ち返す。`);
    if(c.style==='brawl')order.push(`分断の順番：入口へディスラプター、前衛を削る、孤立した${firstPick.hero_ja}へレールガン。`);
    const highground=[];
    if(c.style==='dive')highground.push(`高台は待ち伏せ場所ではなく逃げ道。${this.skillsText(c.dive.slice(0,2),['engage','avoid'],'接近スキル',3)}で触られたら粘らず降りて、次の高台を再確保する。`);
    else if(c.style==='poke')highground.push(`高台は射線を増やすために使う。${this.names(c.snipers.length?c.snipers:c.poke.slice(0,2))}と正面で見合う高台は捨てる。`);
    else if(c.style==='air')highground.push(`高台で空中組と高さを合わせる。真下から追わず、${flyerSkillText}の終点と着地先を横から見る。`);
    else highground.push(`高台から${firstFarm.hero_ja}を撃ってエネルギーを作り、${firstPick.hero_ja}へレールガンを通したら位置を変える。`);
    if(avg(sel,'threat_highground')>=7 || avg(sel,'highground')>=7)highground.push(`敵の高台干渉が強い。1か所に居座らず、撃つ、隠れる、移るの順で運用する。`);
    const peak=[];
    if(c.snipers.length)peak.push(`${this.names(c.snipers)}が見ている角は、チャージ中に顔を出さない。レールガンを撃つ瞬間だけピークする。`);
    if(c.flankers.length)peak.push(`${this.names(c.flankers)}が見えない時間は、横を警戒してピーク回数を減らす。${flankerSkillText}を見てからスライドを使う。`);
    if(c.style==='brawl')peak.push(`敵が前進中は長く撃てるが、曲がり角を越えられたら遮蔽へ下がる。近距離の撃ち合いに付き合わない。`);
    if(!peak.length)peak.push(`レールガンを撃つ瞬間だけ顔を出す。通常射撃で溜める時間と、レールガンで抜く時間を分ける。`);
    peak.push(`同じ角から二度続けてレールガンを撃たない。2発目は一歩横、下段、高台の別射線から通す。`);
    const ultimate=[];
    if(c.block.length)ultimate.push(`使用禁止条件：${blockSkillText}が残っている間はオーバークロックを使わない。`);
    if(c.save.length)ultimate.push(`使う前の準備：${saveSkillText}を使わせる。使った直後に${this.names(c.pick.slice(0,2))}を狙う。`);
    if(c.style==='dive')ultimate.push(`使う角度：敵の接近を受けた直後ではなく、スライドで距離を作った後に横射線から使う。`);
    else if(c.style==='poke')ultimate.push(`使う角度：正面勝負ではなく、${this.names(c.snipers.length?c.snipers.slice(0,2):c.poke.slice(0,2))}が別方向を見た瞬間に短くピークする。`);
    else if(c.style==='air')ultimate.push(`使う対象：空中組だけに固執しない。${this.skillsText(c.flyers.slice(0,2),['avoid','engage'],'飛行スキル',3)}後の着地か、地上の${this.names(c.pick.slice(0,2))}を狙う。`);
    else ultimate.push(`使う条件：${firstPick.hero_ja}か${supportNames}が遮蔽から離れ、防御スキルを使った後。`);
    const forbidden=[];
    forbidden.push(`レールガン100を抱えたまま、${firstPick.hero_ja}を見逃すこと。`);
    
    if(c.style==='dive')forbidden.push(`${this.names(c.dive.slice(0,2))}が残っているのに、パワー・スライドを攻撃目的で先に使うこと。`);
    if(c.style==='poke')forbidden.push(`${this.names(c.snipers.length?c.snipers:c.poke.slice(0,2))}の正面でチャージ中に長く立つこと。`);
    if(c.style==='brawl')forbidden.push(`敵の前進ルートを見ず、ディスラプター・ショットを何となく正面へ投げること。`);
    if(c.save.length)forbidden.push(`${saveSkillText}確認前にオーバークロックを撃ち切ること。`);
    if(c.flyers.length)forbidden.push(`${this.names(c.flyers)}を追って孤立し、地上の撃破対象を見失うこと。`);
    return {
      score:this.compScore(sel),
      compType:c.compLabel,
      plan:this.plan(sel),
      factors:unique(factors,6),
      opening:unique(opening,5),
      order:unique(order,5),
      highground:unique(highground,4),
      peak:unique(peak,5),
      ultimate:unique(ultimate,5),
      forbidden:unique(forbidden,6),
      targets:c.pick.slice(0,3)
    }
  },
  detail(h){const db=DATA.sojourn_hero_db?.[h.hero_id];if(db)return this.skillAwareDetail(h,{
    gameplan:db.gameplan,main:db.railgun_management,move:db.power_slide,sustain:db.disruptor_shot,ultimate:db.overclock,highground:db.highground,forbidden:db.forbidden_actions,rank:db.rank_tips,targets:db.priority_targets
  });return this.skillAwareDetail(h,{
    gameplan:`${h.hero_ja}相手は中距離でエネルギーを作り、レールガンをサポートかダメージへ使う。`,
    main:'レールガンは抱え込みすぎず、撃てる対象へ早めに使う。',
    move:(h.stats.threat_sojourn||0)>=7?'パワー・スライドは退避専用。攻撃利用は控える。':'高台取得と射線変更に使えるが、退路は必ず残す。',
    sustain:(h.stats.disruptor_value||0)>=7?'ディスラプター・ショットは通路入口、退路、高台入口へ置く。':'ディスラプター・ショットはキル補助や遮蔽裏の追い出しに使う。',
    ultimate:(h.stats.overclock_threat||0)>=7?'防御・回避スキルを確認してからオーバークロックを使う。先撃ちは禁止。':'遮蔽から離れたサポートかダメージを優先してオーバークロックで狙う。',
    highground:(h.stats.threat_sojourn||0)>=7?'高台常駐は禁止。撃って降りる。':'高台を使ってレールガンの射線を作る。',
    forbidden:['レールガン100を抱え込むこと。','パワー・スライドを先に攻撃利用すること。','防御スキル確認前にオーバークロックを使うこと。'],
    rank:null,targets:['サポート','ダメージ',h.hero_ja]
  })}
};
function engine(){return target()==='Sojourn'?SojournEngine:SoldierEngine;}
function diagnose(){const sel=selectedEnemy();const d=engine().diagnose(sel);d.factors=d.factors.map(sanitizeForTarget);d.opening=d.opening.map(sanitizeForTarget);d.order=d.order.map(sanitizeForTarget);d.highground=d.highground.map(sanitizeForTarget);d.peak=d.peak.map(sanitizeForTarget);d.ultimate=d.ultimate.map(sanitizeForTarget);d.forbidden=d.forbidden.map(sanitizeForTarget);document.getElementById('result').innerHTML=`<div class="card"><h2>構成評価</h2><div class="grid"><div class="kpi"><div class="name">相性</div><div class="value">${d.score}</div></div><div class="kpi"><div class="name">構成タイプ</div><div class="value">${d.compType||compType(sel)}</div></div><div class="kpi"><div class="name">${targetJa()}の戦い方</div><div class="value">${d.plan}</div></div><div class="kpi"><div class="name">対象</div><div class="value">${targetJa()}</div></div></div><h3>① 勝敗を分ける要素</h3><ul>${d.factors.map(x=>`<li>${x}</li>`).join('')}</ul><h3>② 開幕行動</h3><ul>${d.opening.map(x=>`<li>${x}</li>`).join('')}</ul><h3>③ 撃つ順番</h3><ol class="stepList">${d.order.map(x=>`<li>${x}</li>`).join('')}</ol><h3>④ 高台運用</h3><ul>${d.highground.map(x=>`<li>${x}</li>`).join('')}</ul><h3>⑤ ピークするタイミング</h3><ul>${d.peak.map(x=>`<li>${x}</li>`).join('')}</ul><h3>⑥ ${cfg().ultimate}使用条件</h3><ul>${d.ultimate.map(x=>`<li>${x}</li>`).join('')}</ul><h3>⑦ 絶対にやってはいけないこと</h3><ul>${d.forbidden.map(x=>`<li>${x}</li>`).join('')}</ul><h3>優先して意識する敵</h3>${d.targets.map((h,i)=>`<span class="pill">${i+1}. ${h.hero_ja}</span>`).join('')}</div>`;}
function showHero(id,btn){document.querySelectorAll('.heroBtn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const h=byId[id];const d=engine().detail(h);for(const k of ['gameplan','main','move','sustain','ultimate','highground']){if(d[k])d[k]=sanitizeForTarget(d[k]);}d.forbidden=(d.forbidden||[]).map(sanitizeForTarget);document.getElementById('detailResult').innerHTML=`<div class="card"><h2>${h.hero_ja}</h2><div><span class="pill">${h.role}</span><span class="pill">${h.sub_role}</span><span class="pill">${targetJa()}視点</span></div><h3>対面方針</h3><div class="guideBox"><p>${d.gameplan}</p></div><h3>${target()==='Sojourn'?'レールガン管理':'メイン火力管理'}</h3><div class="guideBox"><p>${d.main}</p></div><div class="guideGrid"><div class="guideBox"><h4>${cfg().mobility}</h4><p>${d.move}</p></div><div class="guideBox"><h4>${target()==='Sojourn'?'ディスラプター・ショット':'バイオティック・フィールド'}</h4><p>${d.sustain||''}</p></div><div class="guideBox"><h4>${cfg().ultimate}</h4><p>${d.ultimate}</p></div>${d.highground?`<div class="guideBox"><h4>高台運用</h4><p>${d.highground}</p></div>`:''}</div>${d.targets?`<h3>優先対象</h3>${d.targets.map((x,i)=>`<span class="pill">${i+1}. ${x}</span>`).join('')}`:''}<h3>絶対NG</h3><ul>${d.forbidden.map(x=>`<li>${x}</li>`).join('')}</ul>${d.rank?`<h3>ランク別アドバイス</h3><ul><li>シルバー：${d.rank.silver}</li><li>ゴールド：${d.rank.gold}</li><li>プラチナ：${d.rank.platinum}</li></ul>`:''}</div>`;}
function buildHeroGrid(){const root=document.getElementById('heroGrid');let html='';for(const role of roleOrder){html+=`<div class="roleTitle">${role}</div>`;const subs=[...new Set(heroes.filter(h=>h.role===role).map(h=>h.sub_role))];for(const sub of subs){html+=`<div class="subRoleTitle">${sub}</div><div class="heroGrid">`;for(const h of heroes.filter(x=>x.role===role&&x.sub_role===sub)){html+=`<button class="heroBtn" onclick="showHero('${h.hero_id}',this)">${h.hero_ja}</button>`;}html+='</div>';}}root.innerHTML=html;}
initSelects();buildHeroGrid();updateTargetLabel();
</script>
</body>
